{% extends 'blog/base.html' %}

{% block content %}

<h1>My Blog</h1>

{% for post in posts %}
    <h2>{{ post.title }}</h2>
    <p>{{ post.content }}</p>
    <small>By {{ post.author.username }}</small>
    <hr>
{% endfor %}

{% endblock %}
<div class="post">
    <h2>{{ post.title }}</h2>
    <p>{{ post.content }}</p>
    <small>By {{ post.author.username }}</small>
</div>
{% if post.author == user %}
    <a href="{% url 'delete_post' post.id %}">Delete</a>
{% endif %}
