<!DOCTYPE html>
<html>
<head>
    <title>My Blog</title>
    <style>
body {
    font-family: Arial;
    margin: 40px;
    background: #f5f5f5;
}

nav {
    background: #333;
    color: white;
    padding: 10px;
}

nav a {
    color: white;
    margin-left: 10px;
    text-decoration: none;
}

.post {
    background: white;
    padding: 15px;
    margin-top: 15px;
    border-radius: 8px;
}
</style>
</head>
<body>

<!-- 🔵 NAVBAR -->
<div style="border-bottom:1px solid black; padding:10px;">
    <h2>My Blog</h2>

    {% if user.is_authenticated %}
        Welcome, {{ user.username }} |
        <a href="/logout/">Logout</a> |
        <a href="/create/">Create Post</a>
    {% else %}
        <a href="/login/">Login</a> |
        <a href="/signup/">Signup</a>
    {% endif %}
</div>

<!-- 🔵 PAGE CONTENT -->
{% block content %}
{% endblock %}

</body>
</html>
